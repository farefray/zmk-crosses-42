# ============================================================================
# Crosses 42 — ZMK Configuration — STAGE 2
# Foundation locked in. BLE tweaks kept (they're load-bearing for split-pair
# recovery). USB-logging diagnostic removed — left half builds clean again.
# ============================================================================

# ── Pointing device (PMW3610 trackballs) ─────────────────────────────────────
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# ── Battery reporting ─────────────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y

# ── Sleep ────────────────────────────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── USB ──────────────────────────────────────────────────────────────────────
CONFIG_ZMK_USB=y

# ── ZMK Studio ───────────────────────────────────────────────────────────────
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Bluetooth (restored from upstream/previous conf — these were in your
#     working build before Stage 1; defaults differ enough that split-pair can
#     be flaky on the nice_nano without them) ──────────────────────────────
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_CONN_RSSI=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_TPS=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=1

# Logging removed now that split pairing is verified. If you ever need it again
# for diagnosis, re-add the three CONFIG_ZMK_LOGGING_MINIMAL / LOG_MODE_IMMEDIATE
# / LOG_PROCESS_THREAD_STARTUP_DELAY_MS lines and rebuild the LEFT (peripheral)
# with -DSNIPPET=zmk-usb-logging.
