# ============================================================================
# Crosses 42 — ZMK Configuration
# Applies to both left and right halves (crosses_left + crosses_right).
# Add crosses_left.conf / crosses_right.conf for per-side overrides.
# ============================================================================

# ── Pointing device (PMW3610 trackballs) ─────────────────────────────────────
# Required for trackball movement and mouse button support.
# The trackball sensor driver and per-device settings (cursor vs. scroll mode)
# are configured in the Crosses shield overlay (.overlay file), not here.
CONFIG_ZMK_POINTING=y

# ── ZMK Studio ───────────────────────────────────────────────────────────────
# Enable ZMK Studio for live keymap editing over USB/BT.
# Locking disabled — no unlock key required to connect.
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Bluetooth ─────────────────────────────────────────────────────────────────
# Boost TX power for better range (+8 dBm max on nRF52840)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── Battery reporting ─────────────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y

# ── Sleep / power management ──────────────────────────────────────────────────
# Idle timeout before entering deep sleep (ms). Default 30 min.
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ── USB logging ────────────────────────────────────────────────────────────────
# Enable temporarily for debugging; disable for production to save power.
# CONFIG_ZMK_USB_LOGGING=y

# ── Auto-Shift notes ──────────────────────────────────────────────────────────
# Auto-Shift is implemented as a hold-tap behavior in crosses.keymap (the `as`
# behavior, AS() macro). There is no separate CONFIG_ flag needed.
# To change the auto-shift timeout, edit tapping-term-ms in the `as` behavior
# block in crosses.keymap (currently set to 175ms).
# Auto-shift is disabled on L4 (UKR) and L5 (Game) by using &kp instead of AS().

# ── Timing tuning reminders ───────────────────────────────────────────────────
# The following are set in crosses.keymap behaviors, not here, but listed for
# quick reference. Tune these after initial flash:
#
#   HRM tapping-term-ms:       200ms  (hml / hmr behaviors)
#   HRM quick-tap-ms:          175ms  (rapid re-press bypasses hold)
#   HRM require-prior-idle-ms: 150ms  (prevents accidental HRM during typing)
#   Auto-shift tapping-term-ms: 175ms  (as behavior)
#   Tap-dance tapping-term-ms:  200ms  (td_lbrc / td_rbrc / td_sym / td_sym)
