---
# Crosses 42 — Custom build matrix for ProMicro NRF52840 MCUs
# Overrides the template default (which targets Nice!Nano).
#
# Board: promicro_nrf52840 (generic Pro Micro-compatible NRF52840)
# Shields: crosses_left / crosses_right (unchanged from template)

include:
  - board: promicro_nrf52840
    shield: crosses_left
    artifact-name: crosses_42_left

  - board: promicro_nrf52840
    shield: crosses_right
    artifact-name: crosses_42_right

  # Settings reset — wipes all paired BT devices (flash if you need to re-pair)
  - board: promicro_nrf52840
    shield: settings_reset
    artifact-name: crosses_42_settings_reset
